<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="{{ request.scope.get('root_path', '') }}/">
    <title>🚴 Garmin Coach — {{ title }}</title>
    <style>
        :root { --green:#4caf50;--yellow:#ff9800;--red:#f44336;--bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--text:#e0e0e0;--accent:#e94560; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        nav{background:var(--surface);padding:.75rem 1.5rem;display:flex;gap:1.5rem;align-items:center;border-bottom:2px solid var(--accent);}
        nav .brand{font-weight:700;font-size:1.1rem;color:var(--accent);}
        nav a{color:var(--text);text-decoration:none;padding:.4rem .8rem;border-radius:6px;font-size:.9rem;transition:background .2s;}
        nav a:hover,nav a.active{background:var(--surface2);}
        main{padding:1.5rem;max-width:1200px;margin:0 auto;}
        .card{background:var(--surface);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
        .card h2{font-size:1rem;color:var(--accent);margin-bottom:.75rem;}
        .placeholder{text-align:center;padding:3rem;color:#666;font-size:.9rem;}
    </style>
</head>
<body>
    <nav>
        <span class="brand">🚴 Garmin Coach</span>
        <a href="" class="{% if title == 'Dashboard' %}active{% endif %}">Dashboard</a>
        <a href="calendar" class="{% if title == 'Kalender' %}active{% endif %}">Kalender</a>
        <a href="events" class="{% if title == 'Events' %}active{% endif %}">Events</a>
        <a href="trends" class="{% if title == 'Trends' %}active{% endif %}">Trends</a>
        <a href="manual" class="{% if title == 'Manuell' %}active{% endif %}">Manuell</a>
        <a href="settings" class="{% if title == 'Einstellungen' %}active{% endif %}">Einstellungen</a>
    </nav>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
