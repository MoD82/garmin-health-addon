name: "Garmin Health Coach"
description: "Professioneller Rad- und Gesundheitscoach mit GPT-4o — vollautomatisch."
version: "1.0.5"
slug: "garmin_health_coach"
init: false
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  8099/tcp: 8099
watchdog: "http://[HOST]:[PORT:8099]/health"
options:
  openai_api_key: ""
  openai_model: "gpt-4o"
  email_user: ""
  email_password: ""
  email_recipient: ""
  garmin_user: ""
  garmin_password: ""
  analysis_time: "08:00"
  collection_time: "07:30"
  weekly_report_day: "monday"
  weekly_report_time: "08:00"
  timezone: "Europe/Berlin"
  retry_count: 3
  retry_interval_minutes: 15
schema:
  openai_api_key: password
  openai_model: str
  email_user: str
  email_password: password
  email_recipient: str
  garmin_user: str
  garmin_password: password
  analysis_time: str
  collection_time: str
  weekly_report_day: str
  weekly_report_time: str
  timezone: str
  retry_count: int
  retry_interval_minutes: int
